name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Configure environment
        run: |
          printf '%s' "${{ secrets.FIREBASE_JSON }}" | base64 --decode > TMessagesProj_App/google-services.json
          printf '%s' "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > TMessagesProj_App/nekogram.keystore
          echo "storeFile=nekogram.keystore" >> local.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties
          chmod +x ./gradlew
          echo "org.gradle.jvmargs=-Xmx5g -XX:MaxMetaspaceSize=1g -Dkotlin.daemon.jvm.options=-Xmx3g" >> gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties
          echo "org.gradle.parallel=true" >> gradle.properties

      - name: Build APK
        run: |
          set +e
          ./gradlew assembleDebug -PdisableSentry --no-daemon | tee gradle.log
          echo "BUILD_EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Upload Logs on Failure
        if: always() && env.BUILD_EXIT_CODE != '0'
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: gradle.log

      - name: Upload ARMv7a APK
        if: env.BUILD_EXIT_CODE == '0'
        uses: actions/upload-artifact@v4
        with:
          name: Nekogram-ARMv7a
          path: TMessagesProj_App/build/outputs/apk/debug/*armeabi-v7a*.apk
          if-no-files-found: ignore

      - name: Upload Universal APK
        if: env.BUILD_EXIT_CODE == '0'
        uses: actions/upload-artifact@v4
        with:
          name: Nekogram-Universal
          path: TMessagesProj_App/build/outputs/apk/debug/*universal*.apk
          if-no-files-found: ignore